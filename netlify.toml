[build]
  command = "pnpm run build"
  publish = "dist/public"

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    X-XSS-Protection = "1; mode=block"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://* https://*.tile.openstreetmap.org; connect-src 'self' https://docs.google.com https://*.google.com; frame-src 'self' https://www.openstreetmap.org https://*.openstreetmap.org https://www.google.com/maps https://*.google.com;"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
